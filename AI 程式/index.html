<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 程式 - 寶可夢風踩地雷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --sky: #a8dcff;
      --grass: #88d66c;
      --yellow: #ffdc4a;
      --blue: #2f80ed;
      --red: #ff4f5f;
      --ink: #1d2740;
      --muted: #62708a;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(29, 39, 64, 0.14);
      --shadow: rgba(31, 57, 96, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 220, 74, 0.46), transparent 19rem),
        radial-gradient(circle at 82% 16%, rgba(255, 79, 95, 0.28), transparent 18rem),
        radial-gradient(circle at 74% 78%, rgba(47, 128, 237, 0.32), transparent 22rem),
        linear-gradient(180deg, #b9e5ff 0%, #eef9ff 46%, #bff0a8 100%);
      color: var(--ink);
      font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background:
        radial-gradient(circle at 10% 76%, #ffffff 0 22px, transparent 23px),
        radial-gradient(circle at 17% 72%, #ffffff 0 34px, transparent 35px),
        radial-gradient(circle at 77% 18%, #ffffff 0 26px, transparent 27px),
        radial-gradient(circle at 84% 15%, #ffffff 0 42px, transparent 43px);
      filter: blur(1px);
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto -5vw -18vh -5vw;
      height: 38vh;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 12% 35%, rgba(68, 176, 91, 0.66), transparent 24%),
        radial-gradient(ellipse at 60% 28%, rgba(96, 191, 83, 0.58), transparent 28%),
        linear-gradient(180deg, rgba(88, 188, 88, 0.75), rgba(46, 133, 75, 0.88));
      border-radius: 50% 50% 0 0;
    }

    .game {
      position: relative;
      z-index: 1;
      width: min(94vw, 508px);
      padding: 20px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 251, 255, 0.84)),
        var(--panel);
      box-shadow: 0 28px 78px var(--shadow), inset 0 -5px 0 rgba(47, 128, 237, 0.1);
      backdrop-filter: blur(14px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      min-height: 52px;
      padding: 9px 12px;
      border: 2px solid rgba(47, 128, 237, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #eef6ff);
      box-shadow: inset 0 -3px 0 rgba(47, 128, 237, 0.08), 0 8px 18px rgba(47, 128, 237, 0.08);
    }

    .label {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .value {
      color: var(--blue);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 0 rgba(255, 220, 74, 0.5);
    }

    .reset {
      width: 56px;
      height: 52px;
      border: 3px solid #26324c;
      border-radius: 999px;
      background:
        radial-gradient(circle at center, #ffffff 0 7px, #26324c 8px 10px, transparent 11px),
        linear-gradient(180deg, #ff4f5f 0 46%, #26324c 47% 53%, #ffffff 54% 100%);
      color: transparent;
      cursor: pointer;
      box-shadow: 0 9px 0 rgba(29, 39, 64, 0.18), 0 14px 28px rgba(29, 39, 64, 0.18);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .reset:hover {
      transform: translateY(-2px) rotate(-7deg);
      box-shadow: 0 11px 0 rgba(29, 39, 64, 0.16), 0 18px 34px rgba(29, 39, 64, 0.2);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
      aspect-ratio: 1;
      padding: 9px;
      border: 3px solid rgba(29, 39, 64, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px),
        linear-gradient(135deg, #7ecb62, #5ebd79 48%, #65cfd8);
      background-size: 32px 32px, 32px 32px, auto;
      perspective: 900px;
      transform-origin: center;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.32);
    }

    .board.danger {
      animation: boardRed 0.5s ease both, shake 0.5s ease both;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border: 2px solid rgba(29, 39, 64, 0.18);
      border-radius: 8px;
      background:
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.88), transparent 28%),
        linear-gradient(180deg, #ffef7a, #ffc94a);
      color: var(--ink);
      cursor: pointer;
      user-select: none;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 900;
      line-height: 1;
      box-shadow: inset 0 -5px 0 rgba(201, 139, 25, 0.22), 0 7px 0 rgba(29, 39, 64, 0.13);
      transform-style: preserve-3d;
      transform-origin: center;
      transition: border-color 140ms ease, filter 140ms ease, box-shadow 140ms ease;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      background:
        linear-gradient(135deg, transparent 0 46%, rgba(29, 39, 64, 0.13) 47% 53%, transparent 54%),
        radial-gradient(circle at 70% 68%, rgba(47, 128, 237, 0.18), transparent 34%);
      pointer-events: none;
      backface-visibility: hidden;
    }

    .cell:hover {
      filter: brightness(1.07);
      border-color: rgba(47, 128, 237, 0.42);
      box-shadow: inset 0 -5px 0 rgba(201, 139, 25, 0.2), 0 9px 0 rgba(29, 39, 64, 0.12), 0 0 0 4px rgba(47, 128, 237, 0.11);
    }

    .cell.open {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(180deg, #f8fbff, #dcecff);
      border-color: rgba(47, 128, 237, 0.18);
      box-shadow: inset 0 3px 8px rgba(29, 39, 64, 0.12);
      cursor: default;
      animation: flipOpen 360ms cubic-bezier(0.2, 0.72, 0.2, 1) both;
    }

    .cell.open::before {
      opacity: 0;
    }

    .cell.flagged {
      color: #ff3446;
      text-shadow: 0 2px 0 #ffffff, 0 0 14px rgba(255, 79, 95, 0.36);
      animation: flagBounce 310ms ease both;
    }

    .cell.mine {
      background:
        radial-gradient(circle at center, #ffffff 0 11px, #26324c 12px 15px, transparent 16px),
        linear-gradient(180deg, #ff4f5f 0 46%, #26324c 47% 53%, #ffffff 54% 100%);
      border-color: #26324c;
      color: transparent;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.35), 0 0 24px rgba(255, 79, 95, 0.45);
    }

    .cell.mine::after {
      content: "";
      position: absolute;
      width: 13px;
      height: 13px;
      border: 3px solid #26324c;
      border-radius: 50%;
      background: #ffffff;
    }

    .cell.n1 { color: #83c5ff; }
    .cell.n2 { color: #9de7b5; }
    .cell.n3 { color: #ff9aa9; }
    .cell.n4 { color: #bfb2ff; }
    .cell.n5 { color: #ffc98b; }
    .cell.n6 { color: #8ee6e0; }
    .cell.n7 { color: #f6e783; }
    .cell.n8 { color: #f4a7dc; }

    .message {
      min-height: 28px;
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
      font-weight: 800;
    }

    .message.win {
      color: #1d9f63;
    }

    .message.lose {
      color: var(--red);
    }

    .effects {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
    }

    .star {
      position: absolute;
      top: -24px;
      width: 9px;
      height: 9px;
      background: var(--star-color, #ffdc4a);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      animation: starFall var(--duration, 1.9s) linear forwards;
      filter: drop-shadow(0 0 8px var(--star-color, #ffdc4a));
    }

    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: transparent;
      box-shadow:
        0 -34px var(--fw-color),
        24px -24px var(--fw-color),
        34px 0 var(--fw-color),
        24px 24px var(--fw-color),
        0 34px var(--fw-color),
        -24px 24px var(--fw-color),
        -34px 0 var(--fw-color),
        -24px -24px var(--fw-color);
      animation: firework 760ms ease-out forwards;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(29, 39, 64, 0.34);
      backdrop-filter: blur(5px);
    }

    .modal.show {
      display: grid;
    }

    .dialog {
      width: min(90vw, 340px);
      padding: 22px;
      border: 3px solid #26324c;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #eef6ff);
      color: var(--ink);
      text-align: center;
      box-shadow: 0 24px 60px rgba(29, 39, 64, 0.28);
    }

    .dialog-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 12px;
      border: 4px solid #26324c;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #ffffff 0 9px, #26324c 10px 13px, transparent 14px),
        linear-gradient(180deg, #ff4f5f 0 46%, #26324c 47% 53%, #ffffff 54% 100%);
    }

    .dialog-title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 900;
    }

    .dialog-text {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .dialog button {
      min-width: 112px;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 7px 0 #1e5db8;
    }

    .dialog button:active {
      transform: translateY(3px);
      box-shadow: 0 4px 0 #1e5db8;
    }

    @keyframes flipOpen {
      0% { transform: rotateX(0deg) scale(1); }
      58% { transform: rotateX(180deg) scale(0.98); }
      100% { transform: rotateX(0deg) scale(1); }
    }

    @keyframes flagBounce {
      0% { transform: translateY(0) scale(1); }
      36% { transform: translateY(-7px) scale(1.08); }
      68% { transform: translateY(2px) scale(0.98); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes boardRed {
      0% { background-color: transparent; box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.32); }
      16% { background-color: rgba(255, 79, 95, 0.82); box-shadow: 0 0 50px rgba(255, 79, 95, 0.64); }
      100% { background-color: rgba(255, 79, 95, 0.46); box-shadow: 0 0 24px rgba(255, 79, 95, 0.34); }
    }

    @keyframes shake {
      0%, 100% { transform: translate3d(0, 0, 0); }
      12% { transform: translate3d(-8px, 4px, 0); }
      24% { transform: translate3d(7px, -5px, 0); }
      36% { transform: translate3d(-6px, -3px, 0); }
      48% { transform: translate3d(8px, 3px, 0); }
      60% { transform: translate3d(-4px, 5px, 0); }
      72% { transform: translate3d(5px, -2px, 0); }
      84% { transform: translate3d(-2px, 2px, 0); }
    }

    @keyframes starFall {
      0% { transform: translateY(-20px) rotate(0deg) scale(0.8); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg) scale(1.1); opacity: 0; }
    }

    @keyframes firework {
      0% { transform: scale(0.2); opacity: 1; filter: blur(0); }
      100% { transform: scale(1.75); opacity: 0; filter: blur(1px); }
    }

    @media (max-width: 430px) {
      .game {
        padding: 14px;
      }

      .topbar {
        gap: 8px;
      }

      .stat {
        padding: 7px 9px;
      }

      .value {
        font-size: 19px;
      }

      .board {
        gap: 4px;
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="寶可夢風踩地雷遊戲">
    <section class="topbar" aria-label="遊戲狀態">
      <div class="stat">
        <span class="label">剩餘地雷</span>
        <span class="value" id="mineCount">10</span>
      </div>
      <button class="reset" id="reset" type="button" aria-label="重新開始" title="重新開始">重新開始</button>
      <div class="stat">
        <span class="label">計時器</span>
        <span class="value" id="timer">000</span>
      </div>
    </section>

    <section class="board" id="board" aria-label="9 乘 9 踩地雷盤面"></section>
    <div class="message" id="message">左鍵翻開，右鍵插旗。</div>
  </main>

  <div class="effects" id="effects"></div>
  <div class="modal" id="failModal" role="dialog" aria-modal="true" aria-labelledby="failTitle">
    <div class="dialog">
      <div class="dialog-icon" aria-hidden="true"></div>
      <h2 class="dialog-title" id="failTitle">挑戰失敗</h2>
      <p class="dialog-text">踩到精靈球地雷了，重新整理隊伍再出發。</p>
      <button id="modalRestart" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const SIZE = 9;
    const MINES = 10;

    const boardEl = document.getElementById("board");
    const mineCountEl = document.getElementById("mineCount");
    const timerEl = document.getElementById("timer");
    const resetEl = document.getElementById("reset");
    const messageEl = document.getElementById("message");
    const effectsEl = document.getElementById("effects");
    const failModalEl = document.getElementById("failModal");
    const modalRestartEl = document.getElementById("modalRestart");

    let cells = [];
    let gameOver = false;
    let openedCount = 0;
    let flaggedCount = 0;
    let started = false;
    let seconds = 0;
    let timerId = null;
    let audioContext = null;

    function createGame() {
      stopTimer();
      cells = [];
      gameOver = false;
      openedCount = 0;
      flaggedCount = 0;
      started = false;
      seconds = 0;

      timerEl.textContent = "000";
      mineCountEl.textContent = String(MINES);
      messageEl.textContent = "左鍵翻開，右鍵插旗。";
      messageEl.className = "message";
      boardEl.classList.remove("danger");
      boardEl.innerHTML = "";
      effectsEl.innerHTML = "";
      failModalEl.classList.remove("show");

      for (let row = 0; row < SIZE; row++) {
        for (let col = 0; col < SIZE; col++) {
          cells.push({
            row,
            col,
            isMine: false,
            isOpen: false,
            isFlagged: false,
            neighborMines: 0,
            el: null
          });
        }
      }

      placeMines();
      calculateNumbers();
      renderBoard();
    }

    function placeMines() {
      const indexes = [...Array(SIZE * SIZE).keys()];

      for (let i = indexes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }

      indexes.slice(0, MINES).forEach((index) => {
        cells[index].isMine = true;
      });
    }

    function calculateNumbers() {
      cells.forEach((cell) => {
        cell.neighborMines = getNeighbors(cell)
          .filter((neighbor) => neighbor.isMine)
          .length;
      });
    }

    function renderBoard() {
      cells.forEach((cell, index) => {
        const button = document.createElement("button");
        button.className = "cell";
        button.type = "button";
        button.setAttribute("aria-label", `第 ${cell.row + 1} 列，第 ${cell.col + 1} 欄`);
        button.addEventListener("click", () => openCell(index));
        button.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          toggleFlag(index);
        });
        cell.el = button;
        boardEl.appendChild(button);
      });
    }

    function startTimer() {
      if (started) return;
      started = true;
      timerId = setInterval(() => {
        seconds += 1;
        timerEl.textContent = String(seconds).padStart(3, "0");
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function openCell(index) {
      const cell = cells[index];
      if (gameOver || cell.isOpen || cell.isFlagged) return;

      startTimer();

      if (cell.isMine) {
        revealMine(cell);
        playSound("mine");
        endGame(false);
        return;
      }

      playSound("open");
      revealSafeCell(cell);
      checkWin();
    }

    function revealSafeCell(cell) {
      if (cell.isOpen || cell.isFlagged) return;

      cell.isOpen = true;
      openedCount += 1;
      cell.el.classList.add("open");
      cell.el.disabled = true;

      if (cell.neighborMines > 0) {
        cell.el.textContent = cell.neighborMines;
        cell.el.classList.add(`n${cell.neighborMines}`);
        return;
      }

      getNeighbors(cell).forEach(revealSafeCell);
    }

    function revealMine(cell) {
      cell.isOpen = true;
      cell.el.textContent = "";
      cell.el.classList.add("open", "mine");
      cell.el.setAttribute("aria-label", "精靈球地雷");
    }

    function toggleFlag(index) {
      const cell = cells[index];
      if (gameOver || cell.isOpen) return;

      startTimer();
      playSound("flag");

      cell.isFlagged = !cell.isFlagged;
      flaggedCount += cell.isFlagged ? 1 : -1;
      cell.el.textContent = cell.isFlagged ? "🚩" : "";
      cell.el.classList.remove("flagged");
      void cell.el.offsetWidth;
      cell.el.classList.toggle("flagged", cell.isFlagged);
      mineCountEl.textContent = String(MINES - flaggedCount);
    }

    function checkWin() {
      if (openedCount === SIZE * SIZE - MINES) {
        playSound("win");
        endGame(true);
      }
    }

    function endGame(won) {
      gameOver = true;
      stopTimer();
      messageEl.textContent = won ? "過關！星星與烟火登場。" : "踩到精靈球地雷，挑戰失敗。";
      messageEl.className = `message ${won ? "win" : "lose"}`;

      if (won) {
        celebrate();
      } else {
        boardEl.classList.remove("danger");
        void boardEl.offsetWidth;
        boardEl.classList.add("danger");
        setTimeout(() => failModalEl.classList.add("show"), 520);
      }

      cells.forEach((cell) => {
        if (cell.isMine && !cell.isOpen) {
          cell.el.textContent = cell.isFlagged ? "🚩" : "";
          cell.el.classList.add("open", "mine");
        }
        cell.el.disabled = true;
      });
    }

    function getNeighbors(cell) {
      const neighbors = [];

      for (let rowOffset = -1; rowOffset <= 1; rowOffset++) {
        for (let colOffset = -1; colOffset <= 1; colOffset++) {
          if (rowOffset === 0 && colOffset === 0) continue;

          const row = cell.row + rowOffset;
          const col = cell.col + colOffset;

          if (row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
            neighbors.push(cells[row * SIZE + col]);
          }
        }
      }

      return neighbors;
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function tone(frequency, duration, type, volume, delay = 0) {
      const context = getAudioContext();
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const start = context.currentTime + delay;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.03);
    }

    function playSound(kind) {
      try {
        if (kind === "open") {
          tone(660, 0.07, "sine", 0.055);
          tone(920, 0.11, "triangle", 0.035, 0.035);
        } else if (kind === "flag") {
          tone(784, 0.06, "square", 0.04);
          tone(1175, 0.07, "triangle", 0.035, 0.05);
        } else if (kind === "mine") {
          tone(120, 0.32, "sawtooth", 0.13);
          tone(62, 0.42, "square", 0.08, 0.03);
          tone(240, 0.12, "sawtooth", 0.06, 0.08);
        } else if (kind === "win") {
          [523, 659, 784, 988, 1175].forEach((frequency, index) => {
            tone(frequency, 0.15, "triangle", 0.065, index * 0.08);
          });
        }
      } catch (error) {
        // Some browsers delay audio startup until direct user interaction.
      }
    }

    function celebrate() {
      const colors = ["#ffdc4a", "#2f80ed", "#ff4f5f", "#9de7b5", "#f4a7dc"];

      for (let i = 0; i < 48; i++) {
        const star = document.createElement("span");
        star.className = "star";
        star.style.left = `${Math.random() * 100}%`;
        star.style.setProperty("--duration", `${1.25 + Math.random() * 1.65}s`);
        star.style.setProperty("--star-color", colors[i % colors.length]);
        star.style.animationDelay = `${Math.random() * 0.55}s`;
        effectsEl.appendChild(star);
      }

      for (let i = 0; i < 7; i++) {
        setTimeout(() => {
          const firework = document.createElement("span");
          firework.className = "firework";
          firework.style.left = `${18 + Math.random() * 64}%`;
          firework.style.top = `${16 + Math.random() * 42}%`;
          firework.style.setProperty("--fw-color", colors[i % colors.length]);
          effectsEl.appendChild(firework);
          setTimeout(() => firework.remove(), 820);
        }, i * 150);
      }

      setTimeout(() => {
        effectsEl.innerHTML = "";
      }, 3700);
    }

    resetEl.addEventListener("click", createGame);
    modalRestartEl.addEventListener("click", createGame);
    failModalEl.addEventListener("click", (event) => {
      if (event.target === failModalEl) {
        failModalEl.classList.remove("show");
      }
    });
    createGame();
  </script>
</body>
</html>
