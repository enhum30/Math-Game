<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成語填字</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f3e7c4;
      --paper-light: #fff5d8;
      --ink: #201611;
      --muted: #705b45;
      --red: #c4322d;
      --red-deep: #861d20;
      --green: #21795a;
      --green-soft: #d8f3df;
      --gold: #c49436;
      --blue: #2f6f9f;
      --jade: #3c9a8b;
      --violet: #8c67aa;
      --wood: #efd07c;
      --shadow: rgba(69, 45, 21, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
      background:
        radial-gradient(circle at 14% 16%, rgba(71, 157, 142, 0.38), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(196, 50, 45, 0.22), transparent 24%),
        radial-gradient(circle at 76% 78%, rgba(47, 111, 159, 0.26), transparent 28%),
        radial-gradient(circle at 18% 88%, rgba(140, 103, 170, 0.2), transparent 24%),
        linear-gradient(135deg, rgba(146, 99, 42, 0.08) 0 25%, transparent 25% 50%, rgba(47, 111, 159, 0.07) 50% 75%, transparent 75%),
        var(--paper);
      background-size: auto, auto, auto, auto, 38px 38px, auto;
      touch-action: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(125, 83, 30, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(125, 83, 30, 0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.8;
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.5), transparent 34%),
        radial-gradient(ellipse at 36% 48%, rgba(255, 215, 113, 0.18), transparent 36%);
      filter: blur(1px);
    }

    .app {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border: 2px solid rgba(196, 50, 45, 0.42);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 245, 216, 0.9), rgba(232, 245, 224, 0.76)),
        radial-gradient(circle at 100% 0%, rgba(47, 111, 159, 0.18), transparent 38%);
      box-shadow: 0 16px 34px var(--shadow);
    }

    h1 {
      margin: 0;
      color: var(--red-deep);
      font-size: clamp(2.25rem, 6vw, 4.4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.55), 0 8px 20px rgba(47, 111, 159, 0.15);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
    }

    .score-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-item {
      min-width: 110px;
      padding: 9px 12px;
      border: 1px solid rgba(47, 111, 159, 0.42);
      border-radius: 8px;
      background: rgba(255, 250, 229, 0.86);
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .score-item strong {
      display: block;
      color: var(--red-deep);
      font-size: 1.42rem;
      line-height: 1.05;
    }

    .game-panel {
      margin-top: 18px;
      border: 2px solid rgba(60, 154, 139, 0.58);
      border-radius: 8px;
      background:
        radial-gradient(circle at 14% 18%, rgba(196, 50, 45, 0.12), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(47, 111, 159, 0.14), transparent 30%),
        radial-gradient(circle at 78% 88%, rgba(60, 154, 139, 0.12), transparent 32%),
        rgba(255, 245, 216, 0.86);
      box-shadow: 0 18px 36px var(--shadow);
      overflow: hidden;
    }

    .idiom-area {
      padding: clamp(20px, 4vw, 34px);
      border-bottom: 2px solid rgba(196, 50, 45, 0.22);
      text-align: center;
    }

    .idiom-line {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: clamp(8px, 2vw, 16px);
      min-height: 114px;
    }

    .idiom-char,
    .blank {
      display: grid;
      place-items: center;
      width: clamp(62px, 12vw, 104px);
      aspect-ratio: 1;
      font-size: clamp(2.3rem, 8vw, 4.7rem);
      font-weight: 900;
      line-height: 1;
    }

    .idiom-char {
      color: var(--ink);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.45), 0 8px 18px rgba(47, 111, 159, 0.13);
    }

    .blank {
      position: relative;
      border: 3px solid var(--red);
      color: rgba(181, 39, 33, 0.3);
      background:
        linear-gradient(45deg, transparent calc(50% - 1px), rgba(181, 39, 33, 0.24) calc(50% - 1px), rgba(181, 39, 33, 0.24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(-45deg, transparent calc(50% - 1px), rgba(181, 39, 33, 0.24) calc(50% - 1px), rgba(181, 39, 33, 0.24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(181, 39, 33, 0.22) calc(50% - 1px), rgba(181, 39, 33, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(transparent calc(50% - 1px), rgba(181, 39, 33, 0.22) calc(50% - 1px), rgba(181, 39, 33, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        radial-gradient(circle at 18% 16%, rgba(255, 215, 113, 0.24), transparent 32%),
        rgba(255, 250, 229, 0.9);
      transition: box-shadow 0.18s ease, transform 0.18s ease;
    }

    .blank.is-over {
      box-shadow: 0 0 0 6px rgba(47, 111, 159, 0.18), 0 0 30px rgba(60, 154, 139, 0.22);
      transform: translateY(-2px);
    }

    .blank.filled {
      color: var(--red);
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.62);
    }

    .blank.wrong {
      animation: wrongFlash 0.2s ease;
    }

    .feedback {
      min-height: 108px;
      padding: 0 20px 22px;
      text-align: center;
    }

    .feedback h2 {
      margin: 0 0 8px;
      color: var(--jade);
      font-size: 2rem;
      font-weight: 900;
    }

    .feedback p {
      width: min(680px, 100%);
      margin: 0 auto 14px;
      color: #44311e;
      font-size: 1.08rem;
      line-height: 1.65;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    .card-area {
      padding: clamp(16px, 3vw, 26px);
    }

    .card-title {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .tile-rack {
      display: grid;
      grid-template-columns: repeat(5, minmax(70px, 1fr));
      gap: 12px;
      min-height: 224px;
    }

    .word-tile {
      display: grid;
      place-items: center;
      min-height: 58px;
      border: 2px solid rgba(47, 111, 159, 0.58);
      border-radius: 8px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 22%, rgba(196, 50, 45, 0.18), transparent 34%),
        radial-gradient(circle at 85% 18%, rgba(60, 154, 139, 0.16), transparent 34%),
        linear-gradient(100deg, rgba(255, 255, 255, 0.38), transparent 34%),
        repeating-linear-gradient(90deg, rgba(122, 80, 25, 0.045) 0 7px, transparent 7px 15px),
        linear-gradient(180deg, #ffe7a3, var(--wood));
      box-shadow: 0 9px 18px rgba(95, 58, 18, 0.18);
      cursor: grab;
      user-select: none;
      touch-action: none;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
      transition: border-color 0.16s ease, background 0.16s ease, opacity 0.16s ease, transform 0.16s ease;
    }

    .word-tile:active {
      cursor: grabbing;
    }

    .word-tile.dragging {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      width: var(--drag-width);
      height: var(--drag-height);
      box-shadow: 0 18px 34px rgba(52, 32, 12, 0.34), 0 0 0 5px rgba(47, 111, 159, 0.16);
      transform: scale(1.06);
    }

    .word-tile.placeholder {
      opacity: 0.18;
      transform: scale(0.96);
    }

    .word-tile.correct {
      border-color: #2f8b50;
      background:
        radial-gradient(circle at 72% 18%, rgba(255, 255, 255, 0.42), transparent 34%),
        linear-gradient(180deg, #e8f8de, var(--green-soft));
      color: var(--green);
    }

    .word-tile.wrong {
      animation: tileWrong 0.2s ease;
    }

    button {
      min-height: 44px;
      border: 2px solid var(--red-deep);
      border-radius: 8px;
      padding: 9px 18px;
      color: #fff8df;
      background: linear-gradient(135deg, #d94d3f, #8c2c8f 52%, #2f6f9f);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(89, 35, 18, 0.24);
    }

    button:hover {
      filter: brightness(1.04);
    }

    .result-screen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(50, 66, 72, 0.42);
      backdrop-filter: blur(3px);
      z-index: 40;
    }

    .result-screen.show {
      display: grid;
    }

    .result-card {
      width: min(520px, 100%);
      padding: 28px;
      border: 3px double var(--red-deep);
      border-radius: 8px;
      background:
        radial-gradient(circle at 16% 12%, rgba(60, 154, 139, 0.22), transparent 32%),
        radial-gradient(circle at 92% 28%, rgba(196, 50, 45, 0.16), transparent 28%),
        var(--paper-light);
      text-align: center;
      box-shadow: 0 24px 50px rgba(52, 32, 12, 0.34);
    }

    .result-card h2 {
      margin: 0 0 10px;
      color: var(--red-deep);
      font-size: clamp(2rem, 7vw, 3.6rem);
      font-weight: 900;
    }

    .result-card p {
      margin: 0 0 20px;
      color: var(--ink);
      font-size: 1.18rem;
      font-weight: 700;
      line-height: 1.6;
    }

    @keyframes wrongFlash {
      50% {
        box-shadow: 0 0 0 7px rgba(213, 34, 34, 0.26);
        background-color: rgba(255, 204, 204, 0.7);
      }
    }

    @keyframes tileWrong {
      0%, 100% {
        transform: translateX(0);
      }
      35% {
        transform: translateX(-8px);
        box-shadow: 0 0 0 5px rgba(213, 34, 34, 0.24);
      }
      70% {
        transform: translateX(8px);
      }
    }

    @media (max-width: 760px) {
      body {
        touch-action: pan-y;
      }

      header {
        align-items: stretch;
        flex-direction: column;
        padding: 16px;
      }

      .score-strip {
        justify-content: stretch;
      }

      .score-item {
        flex: 1 1 120px;
      }

      .tile-rack {
        display: flex;
        overflow-x: auto;
        min-height: 98px;
        padding-bottom: 10px;
        scroll-snap-type: x proximity;
      }

      .word-tile {
        flex: 0 0 76px;
        min-height: 68px;
        scroll-snap-align: start;
      }
    }

    @media (max-width: 440px) {
      .app {
        width: min(100% - 18px, 1040px);
      }

      .idiom-area {
        padding-left: 10px;
        padding-right: 10px;
      }

      .idiom-line {
        gap: 6px;
      }
    }

    .map-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(255, 214, 109, 0.8);
      border-radius: 8px;
      color: var(--gold-bright);
      background: rgba(27, 18, 16, 0.9);
      text-decoration: none;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      font-weight: 900;
      box-shadow: 0 8px 18px var(--shadow);
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main class="app">
    <header>
      <div>
        <h1>成語填字</h1>
        <p class="subtitle">拖曳字卡，補成完整成語。</p>
      </div>
      <div class="score-strip" aria-live="polite">
        <div class="score-item">題目 <strong id="roundText">1 / 5</strong></div>
        <div class="score-item">答對 <strong id="scoreText">0</strong></div>
      </div>
    </header>

    <section class="game-panel" aria-label="成語填字遊戲">
      <div class="idiom-area">
        <div class="idiom-line" id="idiomLine"></div>
      </div>

      <div class="feedback hidden" id="feedback">
        <h2>✓ 答對！</h2>
        <p id="meaningText"></p>
        <button type="button" id="nextButton">下一題</button>
      </div>

      <div class="card-area">
        <h2 class="card-title">字卡</h2>
        <div class="tile-rack" id="tileRack"></div>
      </div>
    </section>
  </main>

  <div class="result-screen" id="resultScreen" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result-card">
      <h2 id="resultTitle">挑戰完成</h2>
      <p id="resultText"></p>
      <button type="button" id="restartButton">重新挑戰</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { 成語: "一鳴驚人", 缺字: [1, 2], 答案: ["鳴", "驚"], 意思: "比喻平時默默無聞，突然有驚人表現。" },
      { 成語: "風花雪月", 缺字: [1, 3], 答案: ["花", "月"], 意思: "原指四時景色，後比喻浮華空洞的詩文。" },
      { 成語: "三番五次", 缺字: [1, 3], 答案: ["番", "次"], 意思: "形容次數很多。" },
      { 成語: "一字千金", 缺字: [1, 3], 答案: ["字", "金"], 意思: "形容文字價值極高。" },
      { 成語: "畫龍點睛", 缺字: [1, 3], 答案: ["龍", "睛"], 意思: "比喻在關鍵處點明要旨。" },
      { 成語: "亡羊補牢", 缺字: [0, 2], 答案: ["亡", "補"], 意思: "比喻出了差錯以後，想辦法補救，還不算晚。" },
      { 成語: "守株待兔", 缺字: [1, 3], 答案: ["株", "兔"], 意思: "比喻拘泥舊法，不知變通，或心存僥倖。" },
      { 成語: "狐假虎威", 缺字: [1, 2], 答案: ["假", "虎"], 意思: "比喻倚仗別人的勢力來欺壓人。" },
      { 成語: "杯弓蛇影", 缺字: [1, 2], 答案: ["弓", "蛇"], 意思: "比喻疑神疑鬼，自相驚擾。" },
      { 成語: "刻舟求劍", 缺字: [0, 3], 答案: ["刻", "劍"], 意思: "比喻拘泥成例，不知情勢已經改變。" },
      { 成語: "胸有成竹", 缺字: [1, 3], 答案: ["有", "竹"], 意思: "比喻做事之前已有完整的計畫或把握。" },
      { 成語: "雪中送炭", 缺字: [0, 3], 答案: ["雪", "炭"], 意思: "比喻在別人急需時給予幫助。" }
    ];

    const DISTRACTORS = "天地山水日月星雲雨風春夏秋冬東西南北金木火土仁義禮智信龍鳳馬牛心手口目耳";
    const GAME_SIZE = 5;
    const TILE_COUNT = 15;

    const idiomLine = document.querySelector("#idiomLine");
    const tileRack = document.querySelector("#tileRack");
    const roundText = document.querySelector("#roundText");
    const scoreText = document.querySelector("#scoreText");
    const feedback = document.querySelector("#feedback");
    const meaningText = document.querySelector("#meaningText");
    const nextButton = document.querySelector("#nextButton");
    const resultScreen = document.querySelector("#resultScreen");
    const resultText = document.querySelector("#resultText");
    const restartButton = document.querySelector("#restartButton");

    let gameQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let filledCount = 0;
    let activeDrag = null;

    function shuffle(items) {
      const output = [...items];
      for (let i = output.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [output[i], output[j]] = [output[j], output[i]];
      }
      return output;
    }

    function startGame() {
      gameQuestions = shuffle(QUESTIONS).slice(0, GAME_SIZE);
      currentIndex = 0;
      score = 0;
      resultScreen.classList.remove("show");
      renderQuestion();
    }

    function renderQuestion() {
      const question = gameQuestions[currentIndex];
      filledCount = 0;
      feedback.classList.add("hidden");
      idiomLine.innerHTML = "";
      tileRack.innerHTML = "";

      [...question.成語].forEach((char, index) => {
        const missingIndex = question.缺字.indexOf(index);
        const node = document.createElement("div");

        if (missingIndex >= 0) {
          node.className = "blank";
          node.textContent = "□";
          node.dataset.answer = question.答案[missingIndex];
          node.dataset.filled = "false";
          idiomLine.appendChild(node);
          return;
        }

        node.className = "idiom-char";
        node.textContent = char;
        idiomLine.appendChild(node);
      });

      makeTiles(question).forEach((char, index) => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "word-tile";
        tile.textContent = char;
        tile.dataset.char = char;
        tile.dataset.tileId = `tile-${currentIndex}-${index}`;
        tile.addEventListener("pointerdown", startDrag);
        tileRack.appendChild(tile);
      });

      updateScoreboard();
    }

    function makeTiles(question) {
      const answers = [...question.答案];
      const answerSet = new Set(answers);
      const pool = shuffle([...new Set([...DISTRACTORS].filter((char) => !answerSet.has(char)))]);
      return shuffle([...answers, ...pool.slice(0, TILE_COUNT - answers.length)]);
    }

    function updateScoreboard() {
      roundText.textContent = `${Math.min(currentIndex + 1, GAME_SIZE)} / ${GAME_SIZE}`;
      scoreText.textContent = String(score);
    }

    function startDrag(event) {
      const tile = event.currentTarget;
      if (tile.disabled || feedback.classList.contains("hidden") === false) {
        return;
      }

      event.preventDefault();

      const rect = tile.getBoundingClientRect();
      const placeholder = document.createElement("span");
      placeholder.className = "word-tile placeholder";
      placeholder.style.width = `${rect.width}px`;
      placeholder.style.height = `${rect.height}px`;
      tile.after(placeholder);

      tile.style.setProperty("--drag-width", `${rect.width}px`);
      tile.style.setProperty("--drag-height", `${rect.height}px`);
      tile.classList.add("dragging");
      document.body.appendChild(tile);

      activeDrag = {
        tile,
        placeholder,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        lastX: event.clientX,
        lastY: event.clientY,
        currentBlank: null
      };

      moveTile(event.clientX, event.clientY);
      markHoveredBlank(event.clientX, event.clientY);
      document.addEventListener("pointermove", dragMove);
      document.addEventListener("pointerup", endDrag);
      document.addEventListener("pointercancel", cancelDrag);
    }

    function dragMove(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      event.preventDefault();
      activeDrag.lastX = event.clientX;
      activeDrag.lastY = event.clientY;
      moveTile(event.clientX, event.clientY);
      markHoveredBlank(event.clientX, event.clientY);
    }

    function moveTile(clientX, clientY) {
      activeDrag.tile.style.left = `${clientX - activeDrag.offsetX}px`;
      activeDrag.tile.style.top = `${clientY - activeDrag.offsetY}px`;
    }

    function markHoveredBlank(clientX, clientY) {
      document.querySelectorAll(".blank.is-over").forEach((blank) => blank.classList.remove("is-over"));
      activeDrag.tile.style.visibility = "hidden";
      const target = document.elementFromPoint(clientX, clientY);
      activeDrag.tile.style.visibility = "";
      const blank = target ? target.closest(".blank") : null;

      if (blank && blank.dataset.filled === "false") {
        blank.classList.add("is-over");
        activeDrag.currentBlank = blank;
      } else {
        activeDrag.currentBlank = null;
      }
    }

    function endDrag(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      cleanupTileListeners();
      markHoveredBlank(event.clientX, event.clientY);
      document.querySelectorAll(".blank.is-over").forEach((blank) => blank.classList.remove("is-over"));

      const blank = activeDrag.currentBlank;
      if (blank && activeDrag.tile.dataset.char === blank.dataset.answer) {
        acceptTile(blank);
      } else {
        rejectTile(blank);
      }
    }

    function cancelDrag(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      cleanupTileListeners();
      returnTile();
    }

    function acceptTile(blank) {
      const tile = activeDrag.tile;
      blank.textContent = tile.dataset.char;
      blank.classList.add("filled");
      blank.dataset.filled = "true";
      tile.classList.remove("dragging");
      tile.classList.add("correct");
      tile.disabled = true;
      tile.removeAttribute("style");
      activeDrag.placeholder.replaceWith(tile);
      activeDrag = null;
      filledCount += 1;
      playBell();

      if (filledCount === 2) {
        score += 1;
        showFeedback();
        updateScoreboard();
      }
    }

    function rejectTile(blank) {
      const tile = activeDrag.tile;
      tile.classList.add("wrong");
      if (blank) {
        blank.classList.add("wrong");
        window.setTimeout(() => blank.classList.remove("wrong"), 200);
      }

      window.setTimeout(() => {
        tile.classList.remove("wrong");
        returnTile();
      }, 200);
    }

    function returnTile() {
      if (!activeDrag) {
        return;
      }

      const tile = activeDrag.tile;
      tile.classList.remove("dragging");
      tile.removeAttribute("style");
      activeDrag.placeholder.replaceWith(tile);
      activeDrag = null;
    }

    function cleanupTileListeners() {
      document.removeEventListener("pointermove", dragMove);
      document.removeEventListener("pointerup", endDrag);
      document.removeEventListener("pointercancel", cancelDrag);
    }

    function showFeedback() {
      const question = gameQuestions[currentIndex];
      meaningText.textContent = question.意思;
      nextButton.textContent = currentIndex === GAME_SIZE - 1 ? "看總成績" : "下一題";
      feedback.classList.remove("hidden");
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= GAME_SIZE) {
        showResult();
        return;
      }

      renderQuestion();
    }

    function showResult() {
      localStorage.setItem("cert_idiom", "1");
      resultText.textContent = `你完成了 ${GAME_SIZE} 題，總成績 ${score} / ${GAME_SIZE}。`;
      resultScreen.classList.add("show");
    }

    function playBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) {
        return;
      }

      const context = new AudioContext();
      const gain = context.createGain();
      gain.connect(context.destination);
      gain.gain.setValueAtTime(0.001, context.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.22, context.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.38);

      [880, 1320].forEach((frequency, index) => {
        const oscillator = context.createOscillator();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, context.currentTime + index * 0.04);
        oscillator.connect(gain);
        oscillator.start(context.currentTime + index * 0.04);
        oscillator.stop(context.currentTime + 0.34 + index * 0.04);
      });

      window.setTimeout(() => context.close(), 520);
    }

    nextButton.addEventListener("click", nextQuestion);
    restartButton.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
